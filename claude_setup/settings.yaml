"$schema": "https://json.schemastore.org/claude-code-settings.json"

env:
  CLAUDE_CODE_USE_POWERSHELL_TOOL: "1"
  CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
  # ANTHROPIC_MODEL: "us.anthropic.claude-opus-4-6[1m]-v1[1m]"
  # ANTHROPIC_DEFAULT_OPUS: "us.anthropic.claude-opus-4-6[1m]-v1[1m]"
  # ANTHROPIC_BEDROCK_MODEL: "us.anthropic.claude-opus-4-6[1m]-v1[1m]"
  ENABLE_TOOL_SEARCH: "true"

permissions:
  defaultMode: "acceptEdits"
  allow:
    - "Skill"
    - "Agent"

    # WebFetch/Search
    - "WebFetch"
    - "WebSearch"

    - "Bash(cd *)"

    # Readonly
    - "Bash(ls *)"
    - "Bash(cat *)"
    - "Bash(grep *)"
    - "Bash(find *)"
    - "Bash(tree *)"
    - "Bash(head *)"
    - "Bash(tail *)"
    - "Bash(less *)"
    - "Bash(more *)"
    - "Bash(wc *)"
    - "Bash(which *)"
    - "Bash(pwd)"
    - "Bash(file *)"
    - "Bash(stat *)"
    - "Bash(du *)"
    - "Bash(df *)"
    - "Bash(ps *)"
    - "Bash(top *)"
    - "Bash(env *)"
    - "Bash(printenv *)"
    - "Bash(echo *)"
    - "Bash(date *)"
    - "Bash(whoami)"
    - "Bash(uname *)"
    - "Bash(hostname *)"

    # Write (scoped to safe directories)
    - "Bash(chmod +x *)"
    - "Bash(mkdir -p *)"
    - "Bash(cp * ~/source/*)"
    - "Bash(cp * __TEMP_DIR__/*)"

    # git
    - "Bash(git status *)"
    - "Bash(git log *)"
    - "Bash(git diff *)"
    - "Bash(git add *)"
    - "Bash(git show *)"
    - "Bash(git branch *)"
    - "Bash(git remote *)"
    - "Bash(git ls *)"
    - "Bash(git rev-parse *)"
    - "Bash(git commit *)"

    # github cli
    - "Bash(gh pr view *)"
    - "Bash(gh pr list *)"
    - "Bash(gh auth status)"

    # python (tightened — uv run can execute arbitrary code)
    - "Bash(uv run --no-project --script *)"
    - "Bash(uv run --no-project --with *)"
    - "Bash(uv run --no-project python *)"
    - "Bash(uv init *)"
    - "Bash(uvx *)"
    


    # Edit
    - "Edit(__TEMP_DIR__/**)"
    - "Edit(~/**)"

    # MCPs
    # GitHub (@modelcontextprotocol/server-github)
    - "mcp__github__*"
    # Context7 documentation finder (https://github.com/upstash/context7)
    - "mcp__context7__*"
    # IDE integration
    - "mcp__ide__*"

  ask:
    - "Bash(git push *)"
    - "Bash(git * push *)"
    - "Bash(git remote *)"
    - "Bash(git * remote)"
    - "Bash(uv publish *)"
    - "Bash(uv * publish *)"
    - "Bash(docker *)"

  deny:
    # Dangerous system commands
    - "Bash(sudo *)"
    - "Bash(su *)"
    - "Bash(dd *)"
    - "Bash(mkfs *)"
    - "Bash(mount *)"
    - "Bash(umount *)"

    # Python other than uv
    - "Bash(pip *)"
    - "Bash(python *)"
    - "Bash(python3 *)"
    - "Bash(pipx *)"

    # Network (prevent exfiltration)
    - "Bash(curl *)"
    - "Bash(wget *)"
    - "Bash(ssh *)"
    - "Bash(scp *)"
    - "Bash(rsync *)"

    # Process management
    - "Bash(kill *)"
    - "Bash(pkill *)"
    - "Bash(systemctl *)"

    # Destructive
    - "Bash(rm -rf *)"
    - "Bash(rm -r *)"
    - "Bash(mv *)"
    - "Bash(chmod -* *)"
    - "Bash(ln *)"

    # Write to arbitrary locations
    - "Bash(cat > *)"
    - "Bash(source *)"

    # Sensitive reads
    - "Read(./.env)"
    - "Read(./.env.*)"
    - "Read(./**/secrets/**)"
    - "Read(~/.ssh/**)"
    - "Read(~/.aws/**)"

# additionalDirectories: extends where Claude's built-in file tools (Read, Edit, Glob, Grep)
# can operate. Does NOT affect Bash subprocesses — those are governed by sandbox.filesystem.
# Think of this as "IDE-level" access: Claude can read/edit files here, subject to permission mode.
additionalDirectories:
  - "__TEMP_DIR__"
  - "~/source"
  # Windows only — installed apps dir (removed on Linux)
  - "__APPDATA_DIR__"
autoMemoryEnabled: false
hooks: 
  PermissionRequest:
  - hooks:
    - type: command
      command: "uv run --no-project ~/.claude/hooks/event-logger.py"
  PostToolUseFailure:
  - hooks:
    - type: command
      command: "uv run --no-project ~/.claude/hooks/event-logger.py"
  UserPromptSubmit:
  - hooks:
    - type: command
      command: "uv run --no-project --script ~/.claude/hooks/encourage_skill_usage.py"
statusLine:
  type: "command"
  command: "__STATUSLINE_COMMAND__"
  # Linux: ~/.claude/statusline.sh
  # Windows: powershell.exe -NoProfile -File ~/.claude/statusline.ps1
  padding: 0

enabledPlugins:
  "superpowers:superpowers-dev": true

model: "opus[1m]"
# model: "us.anthropic.claude-opus-4-6[1m]-v1[1m]"

extraKnownMarketplaces:
  superpowers-dev:
    source: git
    url: "https://github.com/obra/superpowers.git"
  
# Sandbox: OS-level process isolation for Bash subprocesses.
# Uses Seatbelt on macOS, bubblewrap on Linux/WSL2.
# On native Windows: not yet supported — sandbox settings are ignored and Bash runs unsandboxed.
# Even so, keeping these configured means they'll apply automatically if you run in WSL2,
# and permissions.allow/deny still gate what commands Claude will attempt.
#
# sandbox.filesystem vs additionalDirectories:
#   additionalDirectories = where Claude's file tools (Read/Edit/Glob) can reach
#   sandbox.filesystem    = where Bash subprocesses can reach at the OS level
# They're complementary: a dir in additionalDirectories but not sandbox.filesystem.allowWrite
# means Claude can Read/Edit it but Bash commands cannot write to it.
sandbox:
  enabled: true
  autoAllowBashIfSandboxed: true
  allowUnsandboxedCommands: false
  excludedCommands:
    - "docker *"

  filesystem:
    allowRead:
      - "~/.claude"
      - "~/source"
      - "~/.cache"
      # Docker socket
      - "/var/run/docker.sock"
      # Windows only (removed on Linux)
      - "__APPDATA_DIR__"
    allowWrite:
      - "__TEMP_DIR__"
      - "~/source"
      - "~/.cache"
      - "~/.claude"
      # Docker socket
      - "/var/run/docker.sock"
  network:
    allowedDomains:
      # Anthropic
      - "api.anthropic.com"
      - "mcp-proxy.anthropic.com"
      # Docker
      - "registry-1.docker.io"
      - "auth.docker.io"
      - "production.cloudflare.docker.com"

      # GitHub
      - "github.com"
      - "api.github.com"
      - "raw.githubusercontent.com"
      - "objects.githubusercontent.com"

      # Python (uv/pip)
      - "pypi.org"
      - "files.pythonhosted.org"
      - "astral.sh"

      # Node (npm)
      - "registry.npmjs.org"

      # Rust (cargo)
      - "crates.io"
      - "static.crates.io"

      # Ubuntu/apt
      - "archive.ubuntu.com"
      - "security.ubuntu.com"
      - "ppa.launchpadcontent.net"

      # General
      - "google.com"




    
    
